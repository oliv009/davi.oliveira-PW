<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Document</title>
</head>
<body>
  
  <div class="card-container">
    <h2>Cadastro</h2>
    <p>Insira suas informações de identificação.</p>
  
    <form>
      <div class="field-group">
        <label for="nome">Nome Completo</label>
        <input type="text" id="nome" placeholder="Seu nome completo">
      </div>
  
      <div class="row">
        <div class="field-group">
          <label for="rg">RG</label>
          <input type="text" id="rg" placeholder="00.000.000-0">
        </div>
        <div class="field-group">
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" placeholder="000.000.000-00">
        </div>
      </div>
  
      <div class="row">
        <div class="field-group" style="flex: 0.4;">
          <label for="idade">Idade</label>
          <input type="number" id="idade" placeholder="00">
        </div>
        <div class="field-group" style="flex: 1;">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="exemplo@email.com">
        </div>
      </div>
  
      <button type="submit" class="btn-submit">cadastrar</button>
      <button type="reset"class="btn-submit">deletar</button>
      <button type="button"class="btn-submit">alterar</button>
    </form>
  </div>
</body>
</html>
